name: FlemaSize
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic
targets:
  FlemaSize:
    type: application
    platform: iOS
    sources:
      - path: FlemaSize
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.FlemaSize
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: FlemaSize/Info.plist
      properties:
        CFBundleDisplayName: フリマサイズ
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        NSCameraUsageDescription: 商品と硬貨を撮影してサイズを測るためにカメラを使います。写真はこの端末の中だけで処理します。
        NSPhotoLibraryUsageDescription: 保存済みの写真から商品のサイズを測るために使います。写真はこの端末の中だけで処理します。
        NSPhotoLibraryAddUsageDescription: 計測結果の画像を写真に保存するために使います。
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
